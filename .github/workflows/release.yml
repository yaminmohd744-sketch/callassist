name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Mac artifact
        run: |
          DMG=$(ls release/*.dmg | head -1)
          cp "$DMG" release/Pitchr.dmg
      - uses: softprops/action-gh-release@v2
        with:
          files: release/Pitchr.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Rename Windows artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem release -Filter "*.exe" | Select-Object -First 1
          Copy-Item $exe.FullName release/Pitchr-Setup.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: release/Pitchr-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
